<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castelo Art & Design | Portfólio & Expositório Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           1. RESET & BASE
           ========================================================================== */
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: 'Inter', sans-serif;
          scroll-behavior: smooth;
        }

        body {
          background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
          color: rgba(255, 255, 255, 0.85);
          line-height: 1.6;
          min-height: 100vh;
          overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }
        li { list-style: none; }

        h2 {
          font-size: 2.2rem;
          font-weight: 600;
          color: #ffffff;
          margin-bottom: 15px;
          letter-spacing: -0.5px;
        }

        h3 {
          font-size: 1.5rem;
          font-weight: 500;
          color: #ffffff;
          margin-bottom: 20px;
        }

        section {
          padding: 120px 20px 80px 20px;
          max-width: 1200px;
          margin: 0 auto;
        }

        .sec-subtitulo {
          color: rgba(255, 255, 255, 0.6);
          margin-bottom: 40px;
          font-size: 1.05rem;
        }

        /* ==========================================================================
           2. MENU SUPERIOR
           ========================================================================== */
        header {
          position: fixed;
          width: 100%;
          top: 0;
          background: rgba(15, 32, 39, 0.96);
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
          z-index: 1000;
        }

        .nav-container {
          max-width: 1200px;
          margin: 0 auto;
          padding: 20px;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        .logo {
          font-weight: 600;
          font-size: 1.15rem;
          letter-spacing: 1.5px;
          color: #ffffff;
        }

        .nav-links {
          display: flex;
          gap: 30px;
        }

        .nav-links a {
          color: rgba(255, 255, 255, 0.65);
          font-size: 0.95rem;
          transition: color 0.3s ease;
        }

        .nav-links a:hover { color: #6fb1fc; }

        /* ==========================================================================
           3. PAGINA INICIAL / CARROSSEL FIÁVEL
           ========================================================================== */
        .hero-slider {
          position: relative;
          height: 65vh;
          margin-top: 30px;
          background: rgba(255, 255, 255, 0.02);
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 24px;
          overflow: hidden;
        }

        .slide {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px;
          opacity: 0;
          transition: opacity 0.6s ease-in-out;
          z-index: 1;
        }

        .slide.active {
          opacity: 1;
          z-index: 2;
        }

          max-width: 800px;
