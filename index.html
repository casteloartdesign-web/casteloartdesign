}

.info-contactos {
  margin: 30px 0 35px 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.info-contactos p {
  display: flex;
  align-items: center;
  gap: 15px;
  font-size: 1.05rem;
}

.info-contactos i {
  color: #6fb1fc;
  font-size: 1.2rem;
  width: 20px;
}

/* Bloco de Redes Sociais */
.redes-sociais-box {
  margin-bottom: 40px;
}

.redes-sociais-box h4 {
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255, 255, 255, 0.5);
  margin-bottom: 15px;
}

.redes-icons {
  display: flex;
  gap: 15px;
}

.redes-icons a {
  width: 45px;
  height: 45px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ffffff;
  font-size: 1.1rem;
  transition: all 0.3s ease;
}

.redes-icons a:hover {
  transform: translateY(-4px);
  color: #ffffff;
}

.redes-icons a:nth-child(1):hover { background: #1877f2; border-color: #1877f2; }
.redes-icons a:nth-child(2):hover { background: #e1306c; border-color: #e1306c; }
.redes-icons a:nth-child(3):hover { background: #0077b5; border-color: #0077b5; }
.redes-icons a:nth-child(4):hover { background: #25d366; border-color: #25d366; }

/* FAQ Estilo Clean */
.faq-minimal {
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  padding-top: 30px;
}

.faq-minimal h4 {
  font-size: 1rem;
  color: #ffffff;
  margin-bottom: 20px;
}

.faq-item {
  margin-bottom: 20px;
}

.faq-item h5 {
  font-size: 0.98rem;
  color: #6fb1fc;
  margin-bottom: 5px;
  font-weight: 500;
}

.faq-item p {
  font-size: 0.92rem;
  color: rgba(255, 255, 255, 0.6);
  font-weight: 300;
}

/* ==========================================================================
   8. RODAPÉ INSTITUCIONAL (FOOTER)
   ========================================================================== */
.rodape-institucional {
  background: rgba(10, 21, 26, 0.98);
  border-top: 1px solid rgba(255, 255, 255, 0.06);
  padding: 70px 20px 30px 20px;
  margin-top: 50px;
}

.rodape-container {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 50px;
  padding-bottom: 50px;
}

.rodape-coluna {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.rodape-logo {
  font-weight: 600;
  font-size: 1.1rem;
  letter-spacing: 1.5px;
  color: #ffffff;
}

.rodape-descricao {
  font-size: 0.92rem;
  color: rgba(255, 255, 255, 0.5);
  max-width: 400px;
  font-weight: 300;
}

.rodape-coluna h5 {
  font-size: 1rem;
  font-weight: 500;
  color: #ffffff;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
}

.rodape-links {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.rodape-links a {
  font-size: 0.92rem;
  color: rgba(255, 255, 255, 0.5);
  transition: color 0.3s ease, padding-left 0.3s ease;
  display: inline-block;
}

.rodape-links a:hover {
  color: #6fb1fc;
  padding-left: 4px;
}

.rodape-direitos {
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  padding-top: 30px;
}

.rodape-direitos-conteudo {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85rem;
  color: rgba(255, 255, 255, 0.4);
  font-weight: 300;
}

.rodape-credito {
  color: rgba(255, 255, 255, 0.25);
}

/* ==========================================================================
   9. BOTÃO FLUTUANTE DO WHATSAPP (FIXADO)
   ========================================================================== */
.whatsapp-flutuante {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 60px;
  height: 60px;
  background-color: #25d366;
  color: #ffffff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  z-index: 2000;
  animation: pulse 2s infinite;
  transition: background-color 0.3s ease;
}

.whatsapp-flutuante:hover {
  background-color: #20ba5a;
  color: #ffffff;
}

/* ==========================================================================
   10. RESPONSIVIDADE ADAPTATIVA (MOBILE & TABLET)
   ========================================================================== */
@media (max-width: 992px) {
  .contact-container { grid-template-columns: 1fr; gap: 40px; }
  .identidade-cards { grid-template-columns: 1fr; }
  .hero-content h1 { font-size: 2.5rem; }
}

@media (max-width: 768px) {
  .rodape-container { grid-template-columns: 1fr; gap: 35px; }
  .rodape-direitos-conteudo { flex-direction: column; gap: 10px; text-align: center; }
}

@media (max-width: 600px) {
  .nav-links { display: none; }
  .hero-slider { height: auto; padding: 40px 20px; }
  .whatsapp-flutuante { bottom: 20px; right: 20px; width: 50px; height: 50px; font-size: 1.6rem; }
}
