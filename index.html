<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castelo Art & Design | Portfólio Oficial</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* ==========================================================================
           1. RESET GERAL & DESIGN MINIMALISTA SISTÉMICO
           ========================================================================== */
        * { 
          margin: 0; 
          padding: 0; 
          box-sizing: border-box; 
          font-family: 'Inter', sans-serif; 
          scroll-behavior: smooth; 
        }

        body { 
          background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
          color: rgba(255, 255, 255, 0.85); 
          line-height: 1.6; 
          min-height: 100vh; 
          overflow-x: hidden; 
        }

        a { text-decoration: none; color: inherit; }
        li { list-style: none; }

        h2 { 
          font-size: 2.2rem; 
          font-weight: 600; 
          color: #ffffff !important; 
          margin-bottom: 15px; 
          letter-spacing: -0.5px; 
          border-left: 4px solid #6fb1fc;
          padding-left: 15px;
        }

        h3 { 
          font-size: 1.5rem; 
          font-weight: 500; 
          color: #ffffff; 
          margin-bottom: 20px; 
        }

        section { 
          padding: 120px 20px 60px 20px; 
          max-width: 1200px; 
          margin: 0 auto; 
          position: relative;
          z-index: 5;
        }

        .sec-subtitulo { 
          color: rgba(255, 255, 255, 0.6); 
          margin-bottom: 40px; 
          font-size: 1.05rem; 
        }

        /* ==========================================================================
           2. MENU DE NAVEGAÇÃO SUPERIOR (FIXO)
           ========================================================================== */
        header { 
          position: fixed; 
          width: 100%; 
          top: 0; 
          background: rgba(15, 32, 39, 0.98); 
          border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
          z-index: 1000; 
        }

        .nav-container { 
          max-width: 1200px; 
          margin: 0 auto; 
          padding: 20px; 
          display: flex; 
          justify-content: space-between; 
          align-items: center; 
        }

        .logo { 
          font-weight: 600; 
          font-size: 1.15rem; 
          letter-spacing: 1.5px; 
          color: #ffffff; 
        }

        .nav-links { 
          display: flex; 
          gap: 30px; 
        }

        .nav-links a { 
          color: rgba(255, 255, 255, 0.65); 
          font-size: 0.95rem; 
          transition: color 0.3s ease; 
        }

        .nav-links a:hover { color: #6fb1fc; }

        /* ==========================================================================
           3. PÁGINA INICIAL / CARROSSEL AUTOMÁTICO
           ========================================================================== */
        .hero-slider { 
          position: relative; 
          background: rgba(255, 255, 255, 0.02); 
          border: 1px solid rgba(255, 255, 255, 0.08); 
          border-radius: 24px; 
          padding: 60px 40px;
          margin-top: 30px; 
          text-align: center; 
          overflow: hidden; 
          height: 65vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .slide { 
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px;
          opacity: 0; 
          transition: opacity 0.6s ease-in-out;
          z-index: 1;
        }

        .slide.active { 
          opacity: 1; 
          z-index: 2;
        }

        .slide .hero-content { 
          text-align: center; 
          max-width: 800px; 
          margin: 0 auto; 
        }

        .hero-tag { 
          font-size: 0.85rem; 
          text-transform: uppercase; 
          letter-spacing: 3px; 
          color: #6fb1fc; 
          margin-bottom: 15px; 
          display: inline-block; 
          font-weight: 600; 
        }

        .hero-content h1 { 
          font-size: 3.5rem; 
          color: #ffffff; 
          font-weight: 300; 
          margin-bottom: 25px; 
          letter-spacing: -1px;
        }

        .hero-mission { 
          font-size: 1.15rem; 
          color: rgba(255, 255, 255, 0.8); 
          max-width: 750px; 
          margin: 0 auto 35px auto; 
          font-weight: 300;
        }

        .valores-resumo { 
          display: flex; 
          justify-content: center; 
          gap: 30px; 
          flex-wrap: wrap; 
        }

        .valores-resumo span { 
          font-size: 0.9rem; 
          color: rgba(255, 255, 255, 0.9); 
          display: flex; 
          align-items: center; 
          gap: 8px; 
        }

        .valores-resumo i { color: #6fb1fc; }

        .slider-dots { 
          position: absolute;
          bottom: 25px;
          left: 50%;
          transform: translateX(-50%);
          display: flex; 
          gap: 10px; 
          z-index: 10;
        }

        .dot { 
          width: 8px; 
          height: 8px; 
          background: rgba(255, 255, 255, 0.2); 
          border-radius: 50%; 
          cursor: pointer; 
          transition: all 0.3s ease; 
        }

        .dot.active { 
          background: #6fb1fc; 
          width: 24px; 
          border-radius: 4px; 
        }

        /* ==========================================================================
           4. LAYOUT ABA SOBRE NÓS & PERFIL DO CEO
           ========================================================================== */
        .sobre-layout { 
          display: flex; 
          flex-direction: column; 
          gap: 50px; 
        }

        .empresa-perfil p { 
          font-size: 1.1rem; 
          color: rgba(255, 255, 255, 0.8); 
          margin-bottom: 20px; 
          text-align: justify; 
          font-weight: 300;
        }

        .empresa-perfil strong { color: #6fb1fc; font-weight: 500; }

        .identidade-cards { 
          display: grid; 
          grid-template-columns: 1fr 1fr; 
          gap: 25px; 
        }

        .id-card { 
          background: rgba(255, 255, 255, 0.02); 
          border: 1px solid rgba(255, 255, 255, 0.06); 
          padding: 30px; 
          border-radius: 16px; 
        }

        .id-card h4 { 
          font-size: 1.2rem; 
          color: #ffffff; 
          margin-bottom: 12px; 
          display: flex; 
          align-items: center; 
          gap: 10px; 
        }

        .id-card h4 i { color: #6fb1fc; }

        .equipa-grid { 
          display: grid; 
          grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
          gap: 25px; 
          margin-top: 20px;
        }

        .membro-card { 
          background: rgba(255, 255, 255, 0.02); 
          border: 1px solid rgba(255, 255, 255, 0.06); 
          padding: 40px 30px; 
          border-radius: 20px; 
          text-align: center; 
        }

        .ceo-card { border-color: rgba(111, 177, 252, 0.2); }
        .avatar-placeholder { font-size: 2.2rem; color: #6fb1fc; margin-bottom: 20px; }
        .cargo { font-size: 0.85rem; text-transform: uppercase; color: #6fb1fc; letter-spacing: 1px; margin-bottom: 15px; font-weight: 500; }
        .biografia { font-size: 0.98rem; color: rgba(255, 255, 255, 0.75); font-weight: 300; }

        /* ==========================================================================
           5. GRELHA DE PORTFÓLIO & FILTROS DINÂMICOS
           ========================================================================== */
        .portfolio-filtros { 
          display: flex; 
          justify-content: center; 
          gap: 15px; 
          margin-bottom: 40px; 
          flex-wrap: wrap; 
        }

        .filtro-btn { 
          padding: 10px 22px; 
          background: rgba(255, 255, 255, 0.03); 
          border: 1px solid rgba(255, 255, 255, 0.08); 
          color: rgba(255, 255, 255, 0.7); 
          font-size: 0.9rem; 
          font-weight: 500; 
          border-radius: 30px; 
          cursor: pointer; 
          transition: all 0.3s; 
        }

        .filtro-btn.active, .filtro-btn:hover { 
          background: #6fb1fc; 
          border-color: #6fb1fc; 
          color: #0f2027; 
          font-weight: 600; 
        }

        .portfolio-grid { 
          display: grid; 
          grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
          gap: 30px; 
        }

        .portfolio-item { 
          background: rgba(255, 255, 255, 0.01); 
          border: 1px solid rgba(255, 255, 255, 0.06); 
          border-radius: 20px; 
          overflow: hidden; 
          transition: all 0.3s; 
          cursor: pointer; 
        }

        .portfolio-item:hover { 
          transform: translateY(-6px); 
          border-color: #6fb1fc; 
          background: rgba(255, 255, 255, 0.03); 
        }

        .portfolio-item.hide { display: none !important; }

        .item-media-placeholder { 
          background: rgba(255, 255, 255, 0.02); 
          height: 240px; 
          display: flex; 
          flex-direction: column; 
          align-items: center; 
          justify-content: center; 
          gap: 15px; 
          color: rgba(255, 255, 255, 0.3); 
          border-bottom: 1px solid rgba(255, 255, 255, 0.06); 
        }

        .item-media-placeholder i { font-size: 2.5rem; }
        .item-detalhes { padding: 25px; }
