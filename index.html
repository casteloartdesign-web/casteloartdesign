<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castelo Art & Design | Portfólio & Expositório Oficial</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. ANIMAÇÕES NATIVAS (KEYFRAMES)
           ========================================================================== */
        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(30px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }

        @keyframes pulse {
          0% { 
            transform: scale(1); 
            box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); 
          }
          70% { 
            transform: scale(1.05); 
            box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); 
          }
          100% { 
            transform: scale(1); 
            box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); 
          }
        }

        /* ==========================================================================
           2. RESET GERAL & DESIGN MINIMALISTA SISTÉMICO
           ========================================================================== */
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: 'Inter', sans-serif;
          scroll-behavior: smooth;
        }

        body {
          background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
          color: rgba(255, 255, 255, 0.85);
          line-height: 1.6;
          min-height: 100vh;
          overflow-x: hidden;
        }

        a { 
          text-decoration: none; 
          color: inherit; 
        }

        li { 
          list-style: none; 
        }

        /* Títulos Globais */
        h2 {
          font-size: 2.2rem;
          font-weight: 600;
          color: #ffffff !important;
          margin-bottom: 15px;
          letter-spacing: -0.5px;
        }

        h3 {
          font-size: 1.5rem;
          font-weight: 500;
          color: #ffffff;
          margin-bottom: 20px;
        }

        /* Desencadeamento das Animações */
        .hero-content {
          animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .sobre-layout, 
        .portfolio-grid, 
        .contact-container {
          animation: fadeIn 1.2s ease forwards;
        }

        /* ==========================================================================
           3. MENU DE NAVEGAÇÃO SUPERIOR
           ========================================================================== */
        header {
          position: fixed;
          width: 100%;
          top: 0;
          background: rgba(15, 32, 39, 0.96);
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
          z-index: 1000;
          animation: fadeIn 0.8s ease;
        }

        .nav-container {
          max-width: 1200px;
          margin: 0 auto;
          padding: 20px;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        .logo {
          font-weight: 600;
          font-size: 1.15rem;
          letter-spacing: 1.5px;
          color: #ffffff;
        }

        .nav-links {
          display: flex;
          gap: 30px;
        }

        .nav-links a {
          color: rgba(255, 255, 255, 0.65);
          font-size: 0.95rem;
          transition: color 0.3s ease;
        }

        .nav-links a:hover {
          color: #6fb1fc;
        }

        /* ==========================================================================
           4. ESTRUTURA DE SECÇÕES & HERO (INÍCIO - CARROSSEL)
           ========================================================================== */
        section {
          padding: 120px 20px 80px 20px;
          max-width: 1200px;
          margin: 0 auto;
        }

        .sec-subtitulo {
          color: rgba(255, 255, 255, 0.6);
          margin-bottom: 40px;
          font-size: 1.05rem;
        }

        .hero-slider {
          position: relative;
          display: block;
          height: 65vh;
          margin-top: 30px;
          background: rgba(255, 255, 255, 0.02);
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 24px;
          overflow: hidden;
          transition: border-color 0.4s ease;
        }

        .hero-slider:hover {
          border-color: rgba(111, 177, 252, 0.3);
        }

        .slide {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px;
          opacity: 0;
          visibility: hidden;
          transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .slide.active {
          opacity: 1;
          visibility: visible;
        }

        .slide .hero-content {
          text-align: center;
          max-width: 800px;
          margin: 0 auto;
        }

        .hero-tag {
          font-size: 0.85rem;
          text-transform: uppercase;
          letter-spacing: 3px;
          color: #6fb1fc;
          display: inline-block;
          margin-bottom: 15px;
          font-weight: 600;
        }

        .hero-content h1 {
          font-size: 3.5rem;
          color: #ffffff;
          font-weight: 300;
          margin-bottom: 25px;
          letter-spacing: -1px;
        }

        .hero-mission {
          font-size: 1.15rem;
          color: rgba(255, 255, 255, 0.8);
          max-width: 750px;
          margin: 0 auto 35px auto;
          font-weight: 300;
        }

        .valores-resumo {
          display: flex;
          justify-content: center;
          gap: 30px;
          flex-wrap: wrap;
        }

        .valores-resumo span {
          font-size: 0.9rem;
          color: rgba(255, 255, 255, 0.9);
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .valores-resumo i {
          color: #6fb1fc;
        }

        .slider-dots {
          position: absolute;
          bottom: 25px;
          left: 50%;
          transform: translateX(-50%);
          display: flex;
          gap: 10px;
          z-index: 10;
        }

        .dot {
          width: 8px;
          height: 8px;
          background: rgba(255, 255, 255, 0.2);
          border-radius: 50%;
          cursor: pointer;
          transition: all 0.3s ease;
        }

        .dot.active {
          background: #6fb1fc;
          width: 24px;
          border-radius: 4px;
        }

        /* ==========================================================================
           5. LAYOUT ABA SOBRE NÓS
           ========================================================================== */
        .sobre-layout {
          display: flex;
          flex-direction: column;
          gap: 50px;
        }

        .empresa-perfil p {
          font-size: 1.1rem;
          color: rgba(255, 255, 255, 0.8);
          margin-bottom: 20px;
          text-align: justify;
          font-weight: 300;
        }

        .empresa-perfil strong {
          color: #6fb1fc;
          font-weight: 500;
        }

        .identidade-cards {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 25px;
        }

        .id-card {
          background: rgba(255, 255, 255, 0.02);
          border: 1px solid rgba(255, 255, 255, 0.06);
          padding: 30px;
          border-radius: 16px;
          transition: transform 0.3s ease;
        }

        .id-card:hover {
          transform: scale(1.02);
        }

        .id-card h4 {
          font-size: 1.2rem;
          color: #ffffff;
          margin-bottom: 12px;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .id-card h4 i {
          color: #6fb1fc;
        }

        .id-card p {
          font-size: 1rem;
          color: rgba(255, 255, 255, 0.7);
          font-weight: 300;
        }

        .ceo-equipa-section {
          margin-top: 20px;
          width: 100%;
        }

        .equipa-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
          gap: 25px;
          margin-top: 20px;
        }

        .membro-card {
          background: rgba(255, 255, 255, 0.02);
          border: 1px solid rgba(255, 255, 255, 0.06);
          padding: 40px 30px;
          border-radius: 20px;
          text-align: center;
          transition: border-color 0.3s ease;
        }

        .ceo-card {
          border-color: rgba(111, 177, 252, 0.2);
          background: rgba(111, 177, 252, 0.01);
        }

        .ceo-card:hover {
          border-color: #6fb1fc;
        }

        .placeholder-card {
          border-style: dashed;
          opacity: 0.6;
        }

        .avatar-placeholder {
          font-size: 2.2rem;
          color: #6fb1fc;
          margin-bottom: 20px;
        }

        .cargo {
          font-size: 0.85rem;
          text-transform: uppercase;
          color: #6fb1fc;
          letter-spacing: 1px;
          margin-bottom: 15px;
          font-weight: 500;
        }

        .biografia {
          font-size: 0.98rem;
          color: rgba(255, 255, 255, 0.75);
          text-align: center;
          font-weight: 300;
        }

        /* ==========================================================================
           6. FILTROS E GRELHA DE PORTFÓLIO
           ========================================================================== */
        .portfolio-filtros {
          display: flex;
          justify-content: center;
          gap: 15px;
          margin-bottom: 40px;
          flex-wrap: wrap;
        }

        .filtro-btn {
          padding: 10px 22px;
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.08);
          color: rgba(255, 255, 255, 0.7);
          font-size: 0.9rem;
          font-weight: 500;
          border-radius: 30px;
          cursor: pointer;
          transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .filtro-btn:hover {
          background: rgba(255, 255, 255, 0.08);
          color: #ffffff;
          transform: translateY(-1px);
        }

        .filtro-btn.active {
          background: #6fb1fc;
          border-color: #6fb1fc;
          color: #0f2027;
          font-weight: 600;
          box-shadow: 0 4px 15px rgba(111, 177, 252, 0.2);
        }

        .portfolio-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
          gap: 30px;
        }

        .portfolio-item {
          background: rgba(255, 255, 255, 0.01);
          border: 1px solid rgba(255, 255, 255, 0.06);
          border-radius: 20px;
          overflow: hidden;
          transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.3s, background 0.3s;
          cursor: pointer;
        }

        .portfolio-item:hover {
          transform: translateY(-6px);
          border-color: #6fb1fc;
          background: rgba(255, 255, 255, 0.03);
        }

        .item-media-placeholder {
          background: rgba(255, 255, 255, 0.02);
          height: 240px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 15px;
          color: rgba(255, 255, 255, 0.3);
          border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .item-media-placeholder i {
          font-size: 2.5rem;
        }

        .item-detalhes {
          padding: 25px;
        }

        .item-detalhes h4 {
          color: #ffffff;
          font-size: 1.15rem;
          margin-bottom: 5px;
        }

        .item-detalhes p {
          color: rgba(255, 255, 255, 0.5);
          font-size: 0.9rem;
        }

        /* ==========================================================================
           7. ABA CONTACTE-NOS & FORMULÁRIO DE COTAÇÃO
           ========================================================================== */
        .empresas-parceiras-section {
          margin-bottom: 60px;
        }

        .empresas-parceiras-section h4 {
          font-size: 1rem;
          color: rgba(255, 255, 255, 0.5);
          text-transform: uppercase;
          letter-spacing: 2px;
          margin-bottom: 25px;
        }

        .logos-grid-placeholder {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 20px;
        }

          background: rgba(255, 255, 255, 0.01);
          border
